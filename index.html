<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakUp">
<meta name="description" content="专为中国人设计的英语学习路线图">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>SpeakUp English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <span class="logo-speak">Speak</span><span class="logo-up">Up</span>
    </div>
    <p class="splash-sub">开始你的英语突破之旅</p>
    <div class="splash-loader"><div class="loader-bar"></div></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- TOP NAV -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="logo-sm"><span>Speak</span><span class="accent">Up</span></div>
      <div class="top-stats">
        <div class="streak-pill" id="streakPill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2C9 7 6 9.5 6 13a6 6 0 0012 0c0-3.5-3-6-6-11z" fill="#FF6B35"/><path d="M12 14c-1 2 0 4 2 4" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span id="streakCount">0</span> 天
        </div>
        <div class="xp-pill" id="xpPill">
          <svg width="12" height="12" viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#FFD700"/></svg>
          <span id="xpCount">0</span> XP
        </div>
      </div>
    </div>
  </header>

  <!-- PAGES -->
  <main class="page-container">

    <!-- PAGE: ROADMAP -->
    <section class="page active" id="page-roadmap">
      <div class="page-scroll">
        <div class="page-hero">
          <h1 class="hero-title">你的英语<br><span class="hero-accent">突破路线图</span></h1>
          <p class="hero-sub">从零到流利 · 清晰的每一步</p>
        </div>

        <div class="roadmap-container" id="roadmapContainer">
          <!-- Generated by JS -->
        </div>

        <div class="roadmap-legend">
          <div class="legend-item"><div class="legend-dot done"></div><span>已完成</span></div>
          <div class="legend-item"><div class="legend-dot active"></div><span>进行中</span></div>
          <div class="legend-item"><div class="legend-dot locked"></div><span>即将解锁</span></div>
        </div>
      </div>
    </section>

    <!-- PAGE: LESSON -->
    <section class="page" id="page-lesson">
      <div class="page-scroll">
        <button class="back-btn" onclick="showPage('roadmap')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          返回路线图
        </button>
        <div id="lessonContent"></div>
      </div>
    </section>

    <!-- PAGE: PRONUNCIATION -->
    <section class="page" id="page-pronunciation">
      <div class="page-scroll">
        <button class="back-btn" onclick="showPage('roadmap')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          返回路线图
        </button>
        <div id="pronContent"></div>
      </div>
    </section>

    <!-- PAGE: AI CHAT -->
    <section class="page" id="page-chat">
      <div class="chat-layout">

        <!-- Chat header with scenario selector -->
        <div class="chat-header">
          <div class="chat-header-top">
            <div class="ai-avatar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
            </div>
            <div class="ai-info">
              <div class="ai-name">Emma <span class="ai-badge">AI 英语老师</span></div>
              <div class="ai-status" id="aiStatus">选择一个场景开始对话</div>
            </div>
            <button class="chat-reset-btn" id="chatResetBtn" onclick="resetChat()" title="重新开始">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <!-- Scenario pills -->
          <div class="scenario-strip" id="scenarioStrip">
            <button class="scenario-pill active" data-id="cafe" onclick="selectScenario('cafe', this)">☕ 咖啡厅</button>
            <button class="scenario-pill" data-id="job" onclick="selectScenario('job', this)">💼 工作面试</button>
            <button class="scenario-pill" data-id="travel" onclick="selectScenario('travel', this)">✈️ 旅行问路</button>
            <button class="scenario-pill" data-id="shopping" onclick="selectScenario('shopping', this)">🛍 购物</button>
            <button class="scenario-pill" data-id="doctor" onclick="selectScenario('doctor', this)">🏥 看医生</button>
            <button class="scenario-pill" data-id="free" onclick="selectScenario('free', this)">💬 自由对话</button>
          </div>
        </div>

        <!-- API key gate (shown when no key set) -->
        <div class="api-gate" id="apiGate">
          <div class="api-gate-inner">
            <div class="api-gate-icon">🔑</div>
            <div class="api-gate-title">连接 AI 老师</div>
            <div class="api-gate-desc">输入你的 Anthropic API Key 开始与 AI 练习真实英语对话。<br><span style="color:var(--text3)">完全免费 · 永不存储</span></div>
            <input type="password" id="apiKeyInput" class="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false" />
            <div class="api-key-hint">
              <a href="https://console.anthropic.com/account/keys" target="_blank" style="color:var(--accent);text-decoration:none">获取免费 API Key →</a>
            </div>
            <button class="api-save-btn" onclick="saveApiKey()">开始练习 →</button>
          </div>
        </div>

        <!-- Messages area -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Typing indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>

        <!-- Input area -->
        <div class="chat-input-area" id="chatInputArea">
          <div class="chat-input-row">
            <button class="voice-input-btn" id="voiceInputBtn" onclick="toggleVoiceInput()" title="语音输入">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="2"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <textarea
              id="chatInput"
              class="chat-textarea"
              placeholder="用英语说…"
              rows="1"
              onkeydown="handleChatKey(event)"
              oninput="autoResizeTextarea(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="chat-hint" id="chatHint">选择场景后开始对话，Emma 会帮你纠正语法和发音错误</div>
        </div>

      </div>
    </section>

    <!-- PAGE: PROFILE -->
    <section class="page" id="page-profile">
      <div class="page-scroll">
        <div class="page-hero" style="margin-bottom:1.5rem">
          <h1 class="hero-title">我的<span class="hero-accent">进度</span></h1>
        </div>
        <div id="profileContent"></div>
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navTo('roadmap')" id="nav-roadmap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.5523 5.44772 21 6 21H9M19 10L21 12M19 10V20C19 20.5523 18.5523 21 18 21H15M9 21C9 21 9 15 12 15C15 15 15 21 15 21M9 21H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>路线图</span>
    </button>
    <button class="nav-item" onclick="navTo('pronunciation')" id="nav-pronunciation">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="1.8"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>发音</span>
    </button>
    <button class="nav-item chat-nav-item" onclick="navTo('chat')" id="nav-chat">
      <div class="chat-nav-glow">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span>AI 对话</span>
    </button>
    <button class="nav-item" onclick="navTo('profile')" id="nav-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>我的</span>
    </button>
  </nav>

</div>

<!-- LESSON MODAL -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
